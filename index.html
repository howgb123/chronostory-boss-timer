<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楓之谷打王即時同步計時器</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #3498db; --danger: #e74c3c; --success: #2ecc71; --dark: #2c3e50; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; padding: 10px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--dark); margin-bottom: 15px; font-size: 1.5rem; }
        
        /* 快捷按鈕 */
        .preset-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; background: #fff; padding: 10px; border: 1px dashed #ccc; border-radius: 10px; }
        .btn-preset { background: var(--success); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; flex-grow: 1; }
        
        /* 表單 */
        .add-form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; margin-bottom: 5px; color: #7f8c8d; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
        .btn-add { grid-column: span 3; background: var(--danger); color: white; padding: 15px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* 表格列表 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background: var(--dark); color: white; padding: 12px 5px; }
        td { border-bottom: 1px solid #eee; padding: 15px 5px; text-align: center; }
        
        /* 倒數狀態顏色 */
        .status-ready { background-color: #fff2f2; color: var(--danger); font-weight: bold; animation: blink 1s infinite; }
        .status-wait { color: var(--primary); font-weight: bold; font-size: 1.1rem; }
        
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        .btn-re-kill { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; margin-bottom: 5px; font-weight: bold; }
        .btn-del { background: #bdc3c7; color: white; border: none; padding: 5px; border-radius: 5px; width: 100%; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Boss 重生儀表板</h2>
    
    <div class="preset-buttons">
        <button class="btn-preset" onclick="setPreset('黑人馬王', 10)">黑人馬</button>
        <button class="btn-preset" onclick="setPreset('噴火龍', 10)">噴火龍</button>
        <button class="btn-preset" onclick="setPreset('格瑞芬多', 10)">格瑞芬</button>
    </div>

    <div class="add-form">
        <div class="form-group"><label>王名</label><input type="text" id="bossName"></div>
        <div class="form-group"><label>頻道</label><input type="number" id="channel" pattern="\d*"></div>
        <div class="form-group"><label>分鐘</label><input type="number" id="respawnMin"></div>
        <button class="btn-add" onclick="addNewBoss()">擊殺 (新增)</button>
    </div>

    <table>
        <thead>
            <tr>
                <th width="20%">王</th>
                <th width="15%">頻</th>
                <th width="20%">擊殺</th>
                <th width="25%">倒數</th>
                <th width="20%">操作</th>
            </tr>
        </thead>
        <tbody id="bossList"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD9u-zMApkgAM43ksauoe0sh_vmubOZ9oE",
        databaseURL: "https://msw-chrono-boss-timer-default-rtdb.firebaseio.com",
        projectId: "msw-chrono-boss-timer"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let activeTimers = {};

    function setPreset(name, min) {
        document.getElementById('bossName').value = name;
        document.getElementById('respawnMin').value = min;
        document.getElementById('channel').focus();
    }

    function formatTime(ts) {
        if (!ts) return "-";
        const d = new Date(ts);
        return d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
    }

    function addNewBoss() {
        const name = document.getElementById('bossName').value;
        const ch = document.getElementById('channel').value;
        const min = document.getElementById('respawnMin').value;
        if(!name || !ch || !min) return alert("請填寫頻道！");
        db.ref('bosses').push({ name, ch, respawnMin: parseInt(min), lastKill: Date.now() });
        document.getElementById('channel').value = "";
    }

    function killBoss(id) { db.ref('bosses/' + id).update({ lastKill: Date.now() }); }
    function deleteBoss(id) { if(confirm("刪除？")) db.ref('bosses/' + id).remove(); }

    db.ref('bosses').on('value', (snap) => {
        const data = snap.val();
        const tbody = document.getElementById('bossList');
        for (let t in activeTimers) clearInterval(activeTimers[t]);
        activeTimers = {};
        tbody.innerHTML = "";
        if (!data) return;

        let arr = [];
        for (let id in data) {
            arr.push({ id, ...data[id], next: data[id].lastKill + (data[id].respawnMin * 60000) });
        }
        arr.sort((a, b) => a.next - b.next);

        arr.forEach((b) => {
            const row = document.createElement('tr');
            row.id = `row-${b.id}`;
            row.innerHTML = `
                <td><strong>${b.name}</strong></td>
                <td>${b.ch}頻</td>
                <td style="font-size:12px; color:#999">${formatTime(b.lastKill)}</td>
                <td class="status-wait" id="timer-${b.id}">...</td>
                <td>
                    <button class="btn-re-kill" onclick="killBoss('${b.id}')">擊殺</button>
                    <button class="btn-del" onclick="deleteBoss('${b.id}')">刪除</button>
                </td>
            `;
            tbody.appendChild(row);
            startTimer(b.id, b.next, b.lastKill);
        });
    });

    function startTimer(id, next, lastKill) {
        const update = () => {
            const el = document.getElementById(`timer-${id}`);
            const row = document.getElementById(`row-${id}`);
            if (!el) return;
            const now = Date.now();
            if (now - lastKill > 1200000) { deleteBoss(id); return; }

            const diff = next - now;
            if (diff <= 0) {
                el.innerText = "★ 已重生 ★";
                row.className = "status-ready";
                clearInterval(activeTimers[id]);
            } else {
                const m = Math.floor(diff / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                el.innerText = `${m}m ${s}s`;
                if (diff < 60000) el.style.color = "red";
            }
        };
        update();
        activeTimers[id] = setInterval(update, 1000);
    }
</script>
</body>
</html>
