<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrono Story - Boss 狩獵助手</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --bg-color: #f6ebd5;
            --border-color: #a67c52;
            --header-bg: #ffe0a3;
            --text-main: #5d4037;
            --chrono-green: #388e3c;
            --pure-red: #FF0000;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #dfd3c3;
            background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
            padding: 8px;
            margin: 0;
            color: var(--text-main);
        }

        .container {
            max-width: 95%;
            margin: 5px auto;
            background-color: var(--bg-color);
            padding: 15px;
            border-radius: 10px;
            border: 4px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* 標題區：圖示與文字對齊 */
        .header-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 15px;
        }

        .header-icon {
            width: 65px;
            height: 65px;
            object-fit: contain;
        }

        h2 {
            color: var(--chrono-green);
            margin: 0;
            font-size: 2.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* 快捷按鈕區 */
        .preset-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-preset {
            background-color: #8d6e63;
            color: white;
            border: none;
            padding: 15px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            flex-grow: 1;
            font-size: 1.2rem;
        }

        /* 輸入表單：放大字體與高度 */
        .add-form {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            gap: 12px;
            background: var(--header-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 2px solid var(--border-color);
        }

        .form-group label {
            font-size: 1.3rem;
            margin-bottom: 8px;
            font-weight: bold;
            display: block;
        }

        input {
            padding: 15px 10px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-size: 1.4rem;
            width: 100%;
            box-sizing: border-box;
            background-color: #fff8e1;
        }

        .btn-add {
            grid-column: span 3;
            background-color: #c62828;
            color: white;
            padding: 20px;
            font-size: 1.6rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }

        /* 表格區：放大比例，減少空白 */
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th { background-color: var(--border-color); color: white; padding: 15px 5px; font-size: 1.2rem; }
        td { border-bottom: 1px solid rgba(166, 124, 82, 0.3); padding: 18px 5px; text-align: center; font-size: 1.2rem; }

        .boss-name { font-weight: bold; font-size: 1.4rem; }
        .kill-time { font-size: 1.2rem; color: var(--text-main); font-weight: bold; }

        /* 狀態顏色：僅字體變紅 */
        .status-ready-text {
            color: var(--pure-red) !important;
            font-weight: 900;
            font-size: 1.5rem;
        }

        .status-wait {
            color: var(--chrono-green);
            font-weight: bold;
            font-size: 1.3rem;
        }

        .status-urgent {
            color: var(--pure-red);
            font-weight: 900;
            font-size: 1.6rem;
        }

        /* 操作按鈕：加大 */
        .btn-re-kill {
            background-color: #4e342e;
            color: white;
            border: none;
            padding: 18px 10px;
            border-radius: 5px;
            width: 100%;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .btn-del {
            background-color: #b0bec5;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            width: 100%;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <img src="https://i.postimg.cc/63gzwwmN/Adobe-Express-file.png" class="header-icon" alt="icon">
        <h2>Chrono Boss 狩獵名單</h2>
    </div>
    
    <div class="preset-buttons">
        <button class="btn-preset" onclick="setPreset('黑人馬王', 10)">黑人馬</button>
        <button class="btn-preset" onclick="setPreset('噴火龍', 10)">噴火龍</button>
        <button class="btn-preset" onclick="setPreset('格瑞芬多', 10)">格瑞芬</button>
    </div>

    <div class="add-form">
        <div class="form-group"><label>王名</label><input type="text" id="bossName"></div>
        <div class="form-group"><label>頻道</label><input type="number" id="channel"></div>
        <div class="form-group"><label>重生 (分鐘)</label><input type="number" id="respawnMin"></div>
        <button class="btn-add" onclick="addNewBoss()">登錄狩獵紀錄</button>
    </div>

    <table>
        <thead>
            <tr>
                <th width="25%">狩獵目標</th>
                <th width="15%">頻道</th>
                <th width="20%">擊殺時間</th>
                <th width="20%">預計重生</th>
                <th width="20%">操作</th>
            </tr>
        </thead>
        <tbody id="bossList"></tbody>
    </table>
    <p style="font-size: 15px; color: #7f8c8d; text-align: right; margin-top: 30px; font-weight: bold;">
        * 20 分鐘後自動移除紀錄 | chrono story C服專用
    </p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD9u-zMApkgAM43ksauoe0sh_vmubOZ9oE",
        databaseURL: "https://msw-chrono-boss-timer-default-rtdb.firebaseio.com",
        projectId: "msw-chrono-boss-timer"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let activeTimers = {};

    function setPreset(name, min) {
        document.getElementById('bossName').value = name;
        document.getElementById('respawnMin').value = min;
        document.getElementById('channel').focus();
    }

    function formatTime(ts) {
        if (!ts) return "-";
        const d = new Date(ts);
        return d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
    }

    function addNewBoss() {
        const name = document.getElementById('bossName').value;
        const ch = document.getElementById('channel').value;
        const min = document.getElementById('respawnMin').value;
        if(!name || !ch || !min) return alert("填寫完整！");
        db.ref('bosses').push({ name, ch, respawnMin: parseInt(min), lastKill: Date.now() });
        document.getElementById('channel').value = "";
    }

    function killBoss(id) { db.ref('bosses/' + id).update({ lastKill: Date.now() }); }
    function deleteBoss(id) { db.ref('bosses/' + id).remove(); }

    db.ref('bosses').on('value', (snap) => {
        const data = snap.val();
        const tbody = document.getElementById('bossList');
        for (let t in activeTimers) clearInterval(activeTimers[t]);
        activeTimers = {};
        tbody.innerHTML = "";
        if (!data) return;

        let arr = [];
        for (let id in data) {
            arr.push({ id, ...data[id], next: data[id].lastKill + (data[id].respawnMin * 60000) });
        }
        arr.sort((a, b) => a.next - b.next);

        arr.forEach((b) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="boss-name">${b.name}</td>
                <td><strong>${b.ch}</strong> CH</td>
                <td class="kill-time">${formatTime(b.lastKill)}</td>
                <td id="timer-${b.id}" class="status-wait">...</td>
                <td>
                    <button class="btn-re-kill" onclick="killBoss('${b.id}')">再次擊殺</button>
                    <button class="btn-del" onclick="deleteBoss('${b.id}')">刪除</button>
                </td>
            `;
            tbody.appendChild(row);
            startTimer(b.id, b.next, b.lastKill);
        });
    });

    function startTimer(id, next, lastKill) {
        const update = () => {
            const el = document.getElementById(`timer-${id}`);
            if (!el) return;
            const now = Date.now();
            if (now - lastKill > 1200000) { deleteBoss(id); return; }

            const diff = next - now;
            if (diff <= 0) {
                el.innerText = "★ 已重生 ★";
                el.className = "status-ready-text"; 
                clearInterval(activeTimers[id]);
            } else {
                const m = Math.floor(diff / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                el.innerText = `${m}m ${s}s`;
                el.className = (diff < 60000) ? "status-urgent" : "status-wait";
            }
        };
        update();
        activeTimers[id] = setInterval(update, 1000);
    }
</script>
</body>
</html>
